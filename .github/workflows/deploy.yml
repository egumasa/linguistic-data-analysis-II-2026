name: Deploy prerendered site to GitHub Pages

# The Quarto site is rendered locally and committed to sources/docs/.
# CI does NOT build anything — it just uploads the prerendered output and
# deploys it. No Jekyll, no Quarto run here.

on:
  push:
    branches: [main]
    paths:
      - "sources/docs/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload prerendered site
        uses: actions/upload-pages-artifact@v3
        with:
          path: sources/docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
