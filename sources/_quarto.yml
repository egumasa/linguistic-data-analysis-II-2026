project:
  type: website
  title: "Linguistic Data Analysis II (Summer 2026)"
  output-dir: docs

website:
  title: "Linguistic Data Analysis II (Summer 2026)"
  description: "Applying Large Language Models for Linguistic Analysis"
  site-url: "https://egumasa.github.io/linguistic-data-analysis-II-2026/"
  repo-url: "https://github.com/egumasa/linguistic-data-analysis-II-2026"
  repo-actions: [edit, issue]
  
  navbar:
    pinned: true
    background: primary
    right:
      - text: "Course info"
        menu:
          - text: "Syllabus"
            href: syllabus/index.md
          - text: "Readings"
            href: syllabus/readings.md
      - text: "Sessions"
        href: sessions/index.md
      - text: "Final Project"
        href: final-project/index.md
      - text: "Resources"
        href: resources/index.md
      - icon: github
        href: "https://github.com/egumasa/linguistic-data-analysis-II-2026"
        aria-label: GitHub

  sidebar:
    - title: "Sessions"
      style: docked
      collapse-level: 1
      search: true
      contents:
        - text: "Schedule"
          href: sessions/index.md
        - section: "Day 1 · Introduction & First Experience"
          contents:
            - sessions/day1/session-01.md
            - sessions/day1/session-02.md
            - sessions/day1/session-03.md
        - section: "Day 2 · Annotation, Gold Standards & Metrics"
          contents:
            - sessions/day2/session-04.md
            - sessions/day2/session-05.md
            - sessions/day2/session-06.md
        - section: "Day 3 · Prompt Design & Iteration"
          contents:
            - sessions/day3/session-07.md
            - sessions/day3/session-08.md
            - sessions/day3/session-09.md
        - section: "Day 4 · Methodology & Pipeline Assembly"
          contents:
            - sessions/day4/session-10.md
            - sessions/day4/session-11.md
            - sessions/day4/session-12.md
        - section: "Day 5 · Project Finalization & Presentations"
          contents:
            - sessions/day5/session-13.md
            - sessions/day5/session-14.md
            - sessions/day5/session-15.md
        - section: "Daily notebooks"
          href: notebooks/index.md
          contents:
            - notebooks/day1_python_and_first_llm.ipynb
            - notebooks/day2_gold_standards_and_evaluation.ipynb
            - notebooks/day3_prompt_design.ipynb
            - notebooks/day4_pipeline_and_sampling.ipynb
            - notebooks/day5_project_finalization.ipynb

    - title: "Resources"
      style: docked
      collapse-level: 1
      search: true
      contents:
        - text: "All Resources"
          href: resources/index.md
        - section: "Setup & Tools"
          contents:
            - resources/tools/index.md
            - resources/tools/google-colab-setup.md
            - resources/tools/gemini-api-key.md
            - resources/tools/python-setup.md
            - resources/tools/google-drive-data.md
        - section: "Further corpora (optional)"
          contents:
            - resources/corpora/index.md
        - section: "Datasets"
          contents:
            - resources/datasets/index.md
            - resources/datasets/mini-project-tracks.md
        - section: "Extra Topics"
          contents:
            - resources/extra/index.md
            - resources/extra/handling-rate-limits.ipynb
        - section: "GitHub & Optional Workshops"
          contents:
            - resources/github/index.md



format:
  html:
    theme:
      - litera
      - assets/css/style.scss

    # css: css/styles.css
    toc: true
    toc-depth: 3
    toc-location: right
    code-fold: true
    code-summary: "Show code"
    code-tools: true
    smooth-scroll: true
    link-external-icon: true
    link-external-newwindow: true


execute:
  freeze: auto
  engine: jupyter  # or python
  python: uv run python  # This tells Quarto to use uv's Python
