project:
  type: website
  title: "Linguistic Data Analysis II (Summer 2026)"
  output-dir: docs

website:
  title: "Linguistic Data Analysis II (Summer 2026)"
  description: "Applying Large Language Models for Linguistic Analysis"
  site-url: "https://egumasa.github.io/linguistic-data-analysis-II-2026/"
  repo-url: "https://github.com/egumasa/linguistic-data-analysis-II-2026"
  repo-actions: [edit, issue]
  
  navbar:
    pinned: true
    background: primary
    right:
      - text: "Course info"
        href: syllabus/index.md
      - text: "Sessions"
        href: sessions/index.md
      - text: "Final Project"
        href: final-project/index.md
      - text: "Resources"
        href: resources/index.md
      - icon: github
        href: "https://github.com/egumasa/linguistic-data-analysis-II-2026"
        aria-label: GitHub

  sidebar:
    - title: "Sessions"
      style: docked
      collapse-level: 1
      search: true
      contents:
        - text: "Schedule"
          href: sessions/index.md
        - section: "Day 1 · Introduction & First Experience"
          contents:
            - sessions/day1/session1.md
            - sessions/day1/session2.md
            - sessions/day1/session3.md
        - section: "Day 2 · Annotation, Gold Standards & Metrics"
          contents:
            - sessions/day2/session4.md
            - sessions/day2/session5.md
            - sessions/day2/session6.md
        - section: "Day 3 · Prompt Design & Iteration"
          contents:
            - sessions/day3/session7.md
            - sessions/day3/session8.md
            - sessions/day3/session9.md
        - section: "Day 4 · Methodology & Pipeline Assembly"
          contents:
            - sessions/day4/session10.md
            - sessions/day4/session11.md
            - sessions/day4/session12.md
        - section: "Day 5 · Project Finalization & Presentations"
          contents:
            - sessions/day5/session13.md
            - sessions/day5/session14.md
            - sessions/day5/session15.md

    - title: "Resources"
      style: docked
      collapse-level: 1
      search: true
      contents:
        - text: "All Resources"
          href: resources/index.md
        - section: "Setup & Tools"
          contents:
            - resources/tools/index.md
            - resources/tools/python-setup.md
            - resources/tools/byu-corpora-guide.md
            - resources/tools/antconc-guide.md
            - resources/tools/jasp-guide.md
            - resources/tools/taales-taassc.md
            - resources/tools/japanese-nlp.qmd
        - section: "Corpora"
          contents:
            - resources/corpora/index.md
            - resources/corpora/available-corpora.md
            - resources/corpora/learner-corpora.md
        - section: "Datasets"
          contents:
            - resources/datasets/index.md
            - resources/datasets/mini-project-tracks.md
        - section: "Tutorials"
          contents:
            - resources/tutorials/index.md
            - resources/tutorials/tutorial-day2-annotation-eval.md
            - resources/tutorials/tutorial-day3-move-replication.md
        - section: "Additional examples"
          contents:
            - resources/additional-examples/index.md
        - section: "Corpus Lab"
          contents:
            - resources/corpus-lab/index.md
        - section: "GitHub & Optional Workshops"
          contents:
            - resources/github/index.md



format:
  html:
    theme:
      - litera
      - css/style.scss

    # css: css/styles.css
    toc: true
    toc-depth: 3
    toc-location: right
    code-fold: true
    code-summary: "Show code"
    code-tools: true
    smooth-scroll: true
    link-external-icon: true
    link-external-newwindow: true


execute:
  freeze: auto
  engine: jupyter  # or python
  python: uv run python  # This tells Quarto to use uv's Python
